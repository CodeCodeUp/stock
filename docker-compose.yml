services:
  frontend:
    build:
      context: ./frontend
      args:
        DOCKER_MIRROR: ${DOCKER_MIRROR:-docker.m.daocloud.io}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
      - data-api
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      args:
        DOCKER_MIRROR: ${DOCKER_MIRROR:-docker.m.daocloud.io}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-stock}
      DB_USE_SSL: ${DB_USE_SSL:-false}
      DB_ALLOW_PUBLIC_KEY_RETRIEVAL: ${DB_ALLOW_PUBLIC_KEY_RETRIEVAL:-true}
      DATA_API_URL: http://data-api:${DATA_API_PORT:-5000}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    restart: unless-stopped

  data-api:
    build:
      context: ./python
      args:
        DOCKER_MIRROR: ${DOCKER_MIRROR:-docker.m.daocloud.io}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
    environment:
      DATA_API_HOST: 0.0.0.0
      DATA_API_PORT: ${DATA_API_PORT:-5000}
      ENABLE_SCHEDULER: ${ENABLE_SCHEDULER:-true}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-stock}
      SCHEDULER_TIMEZONE: ${SCHEDULER_TIMEZONE:-Asia/Shanghai}
      ENABLE_IMPORTER: ${ENABLE_IMPORTER:-true}
      ENABLE_PRICE_TRACKING: ${ENABLE_PRICE_TRACKING:-true}
      ENABLE_BACKTEST_PIPELINE: ${ENABLE_BACKTEST_PIPELINE:-true}
      ENABLE_BACKTEST_WEEKLY_FULL_REFRESH: ${ENABLE_BACKTEST_WEEKLY_FULL_REFRESH:-true}
      IMPORT_LOOKBACK_DAYS: ${IMPORT_LOOKBACK_DAYS:-7}
      PRICE_TRACKING_MAX_WORKERS: ${PRICE_TRACKING_MAX_WORKERS:-4}
      PRICE_TRACKING_RETRY_TIMES: ${PRICE_TRACKING_RETRY_TIMES:-3}
      PRICE_TRACKING_RETRY_DELAY_SECONDS: ${PRICE_TRACKING_RETRY_DELAY_SECONDS:-1}
      BACKTEST_DAILY_LOOKBACK_DAYS: ${BACKTEST_DAILY_LOOKBACK_DAYS:-7}
      BACKTEST_BAR_SYNC_OVERLAP_DAYS: ${BACKTEST_BAR_SYNC_OVERLAP_DAYS:-10}
      BACKTEST_DAILY_BAR_MAX_WORKERS: ${BACKTEST_DAILY_BAR_MAX_WORKERS:-4}
      BACKTEST_BUILD_BATCH_STOCKS: ${BACKTEST_BUILD_BATCH_STOCKS:-200}
      BACKTEST_DAILY_BAR_RETRY_TIMES: ${BACKTEST_DAILY_BAR_RETRY_TIMES:-3}
      BACKTEST_DAILY_BAR_RETRY_DELAY_SECONDS: ${BACKTEST_DAILY_BAR_RETRY_DELAY_SECONDS:-2}
      BACKTEST_DAILY_BAR_ADJUST: ${BACKTEST_DAILY_BAR_ADJUST:-qfq}
      BACKTEST_HORIZONS: ${BACKTEST_HORIZONS:-5,10,20,60}
      BACKTEST_EVENT_VERSION: ${BACKTEST_EVENT_VERSION:-1}
      BACKTEST_CALC_VERSION: ${BACKTEST_CALC_VERSION:-1}
      DB_WRITE_BATCH_SIZE: ${DB_WRITE_BATCH_SIZE:-2000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    restart: unless-stopped

# Use external network to reach host MySQL, or set DB_HOST to host IP
# If MySQL runs in another compose project, use:
#   networks:
#     default:
#       external:
#         name: <mysql_network_name>
